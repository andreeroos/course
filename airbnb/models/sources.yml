sources:
  - name: airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings
        columns:
          - name: price
            tests:
              - dbt_expectations.expect_column_values_to_match_regex:
                  arguments:
                    regex: '^\\$[0-9]+[0-9.]+.*'
              - not_null

      - name: hosts
        identifier: raw_hosts
        columns:
          - name: host_name
            meta:
              datahub_tags:
                - "pii"

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: hour}
